<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff3366" />
      <stop offset="100%" stop-color="#d90429" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#d90429" flood-opacity="0.25" />
    </filter>
  </defs>
  <!-- Heart shape with shadow and red gradient -->
  <path d="M 50,84 C 12,50 2,24 26,13 C 38,8 47,19 50,23 C 53,19 62,8 74,13 C 98,24 88,50 50,84 Z" 
        fill="url(#heartGrad)" filter="url(#shadow)" />
  
  <!-- Modern white medical cross centered inside the heart -->
  <g fill="#ffffff">
    <rect x="45" y="31" width="10" height="24" rx="3" />
    <rect x="38" y="38" width="24" height="10" rx="3" />
  </g>
  
  <!-- Subtle inner heartbeat wave overlay inside the white cross -->
  <path d="M 40 43 L 46 43 L 48 37 L 50 49 L 52 40 L 54 45 L 60 43" 
        stroke="#d90429" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" />
</svg>
